        const GrowthSimulator = ({ plants }) => {
            const [selectedId, setSelectedId] = useState(plants[0].id);
            const [waterLvl, setWaterLvl] = useState(0);
            const [sunLvl, setSunLvl] = useState(0);
            const [status, setStatus] = useState(null);

            const plant = plants.find(p => p.id == selectedId);

            const handleSimulate = () => {
                let msg = '';
                let type = '';

                if (waterLvl === plant.water && sunLvl === plant.sun) {
                    msg = 'שילוב מושלם! הצמח משגשג ופורח 🌸';
                    type = 'success';
                } else if (waterLvl > plant.water + 1) {
                    msg = 'יותר מדי מים! השורשים נרקבים 🥀';
                    type = 'error';
                } else if (waterLvl < plant.water - 1) {
                    msg = 'הצמח צמא מדי! העלים מתייבשים 🍂';
                    type = 'error';
                } else if (sunLvl > plant.sun) {
                    msg = 'יותר מדי שמש! העלים נשרפים 🔥';
                    type = 'error';
                } else if (sunLvl < plant.sun - 1) {
                    msg = 'חסר אור! הצמח לא מתפתח היטב וצבעיו דוהים 🌑';
                    type = 'error';
                } else {
                    msg = 'תנאים סבירים, אך הצמח יכול לשגשג יותר בתנאים מדויקים יותר 🌱';
                    type = 'warning';

                setStatus({ msg, type });

                        <div className="bg-yellow-50 p-6 rounded-3xl text-center">

        const AdvancedTrivia = ({ plants }) => {
            const [currentQ, setCurrentQ] = useState(0);
            const [score, setScore] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [questions, setQuestions] = useState([]);

            useEffect(() => {
                // Generate questions dynamically
                const qList = [];
                // Q1
                let p1 = plants[Math.floor(Math.random() * plants.length)];
                qList.push({
                    q: `לאיזו משפחה בוטנית שייך ${p1.name}?`,
                    opts: [p1.family, 'סחלביים', 'ורדיים', 'שפתניים'].sort(() => Math.random() - 0.5),
                    ans: p1.family
                });
                // Q2
                let p2 = plants.find(p => p.water === 1) || plants[0];
                qList.push({
                    q: `איזה מהצמחים הבאים דורש מעט מאוד מים (דרגה 1)?`,
                    opts: [p2.name, plants.find(p => p.water > 1)?.name || 'פוטוס', 'ענב ורוד', 'מונסטרה אדנסוני'].sort(() => Math.random() - 0.5),
                    ans: p2.name
                });
                // Q3
                let p3 = plants[Math.floor(Math.random() * plants.length)];
                qList.push({
                    q: `מהו שמו המדעי של ${p3.name}?`,
                    opts: [p3.scientificName, 'Ficus lyrata', 'Calathea orbifolia', 'Sansevieria trifasciata'].sort(() => Math.random() - 0.5),
                    ans: p3.scientificName
                });

                setQuestions(qList);
            }, [plants]);

            const handleAns = (opt) => {
                if (opt === questions[currentQ].ans) {
                    setScore(s => s + 1);
                }
                if (currentQ < questions.length - 1) {
                    setCurrentQ(q => q + 1);
                } else {
                    setShowResult(true);
                }
            };

            const reset = () => {
                setCurrentQ(0);
                setScore(0);
                setShowResult(false);
                // Simple re-render will keep the same questions, ideally we'd re-generate them.
            };

            if (questions.length === 0) return <div>טוען חידון...</div>;

            return (
                <div className="max-w-xl mx-auto bg-white rounded-3xl p-8 shadow-2xl fade-in text-center border-t-8 border-pastel-pink">
                    <h2 className="text-3xl font-bold mb-6 text-pink-800"><Icon name="brain" className="inline mb-1"/> חידון בוטניקה מתקדם</h2>
                    
                    {!showResult ? (
                        <div>
                            <p className="text-gray-500 mb-2">שאלה {currentQ + 1} מתוך {questions.length}</p>
                            <h3 className="text-2xl font-bold text-gray-800 mb-8">{questions[currentQ].q}</h3>
                            <div className="space-y-4">
                                {questions[currentQ].opts.map((opt, i) => (
                                    <button 
                                        key={i}
                                        onClick={() => handleAns(opt)}
                                        className="w-full bg-pastel-blue hover:bg-teal-200 text-teal-900 font-bold py-4 rounded-3xl text-lg transition-colors shadow-sm"
                                    >
                                        {opt}
                                    </button>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="py-10">
                            <h3 className="text-4xl font-bold text-teal-600 mb-4">סיימת! 🎉</h3>
                            <p className="text-2xl mb-8">הציון שלך: {score} / {questions.length}</p>
                            <button onClick={reset} className="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all">
                                נסה שוב
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('catalog');

            return (
                <div>
                    <header className="bg-teal-800 text-white p-8 rounded-b-[3rem] shadow-xl mb-10 text-center">
                        <h1 className="text-5xl font-bold mb-4 flex justify-center items-center gap-4">
                            <Icon name="leaf" className="w-12 h-12 text-pastel-green" /> 
                            בוטניקה-פדיה
                        </h1>
                        <p className="text-teal-200 text-lg">חקור, למד וגדל את הצמחים המיוחדים ביותר בעולם</p>
                    </header>

                    <nav className="flex justify-center gap-4 mb-10 px-4">
                        <button onClick={() => setActiveTab('catalog')} className={`px-8 py-3 rounded-full font-bold transition-all shadow-md flex items-center gap-2 ${activeTab === 'catalog' ? 'bg-teal-600 text-white transform scale-105' : 'bg-white text-teal-800 hover:bg-teal-50'}`}>
                            <Icon name="library" /> קטלוג
                        </button>
                        <button onClick={() => setActiveTab('simulator')} className={`px-8 py-3 rounded-full font-bold transition-all shadow-md flex items-center gap-2 ${activeTab === 'simulator' ? 'bg-teal-600 text-white transform scale-105' : 'bg-white text-teal-800 hover:bg-teal-50'}`}>
                            <Icon name="sprout" /> סימולטור
                        </button>
                        <button onClick={() => setActiveTab('trivia')} className={`px-8 py-3 rounded-full font-bold transition-all shadow-md flex items-center gap-2 ${activeTab === 'trivia' ? 'bg-teal-600 text-white transform scale-105' : 'bg-white text-teal-800 hover:bg-teal-50'}`}>
                            <Icon name="gamepad-2" /> חידון
                        </button>
                    </nav>

                    <main className="container mx-auto px-4">
                        {activeTab === 'catalog' && <PlantCatalog plants={plantDatabase} />}
                        {activeTab === 'simulator' && <GrowthSimulator plants={plantDatabase} />}
                        {activeTab === 'trivia' && <AdvancedTrivia plants={plantDatabase} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
