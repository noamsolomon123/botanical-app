<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אפליקציה בוטנית חינוכית</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Data Source -->
    <script src="data.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts: Varela Round -->
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Varela Round', sans-serif;
            background-color: #fdfbf7; /* Pastel background */
            color: #333;
        }
        
        .pastel-card {
            background: linear-gradient(135deg, #e0f2f1 0%, #b2dfdb 100%);
        }

        .pastel-accent {
            background-color: #ffd54f;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pastel: {
                            green: '#A8E6CF',
                            blue: '#DCEDC1',
                            pink: '#FFD3B6',
                            orange: '#FFAAA5',
                            red: '#FF8B94',
                            yellow: '#FDFFB6'
                        }
                    },
                    borderRadius: {
                        '3xl': '1.5rem',
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen pb-10">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Database ---
        // plantDatabase is loaded from data.js

        // --- Icons ---
        const Icon = ({ name, className }) => {
            useEffect(() => {
                lucide.createIcons();
            });
            return <i data-lucide={name} className={className}></i>;
        };

        // --- Components ---
        const PlantModal = ({ plant, onClose, myGarden = [], toggleGarden = () => {} }) => {
            if (!plant) return null;

            const isSaved = myGarden.includes(plant.id);

            const handleSpeak = (e) => {
                e.stopPropagation();
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); // Stop any current speech
                    const utteranceHebrew = new SpeechSynthesisUtterance(plant.name);
                    utteranceHebrew.lang = 'he-IL';
                    
                    const utteranceLatin = new SpeechSynthesisUtterance(plant.scientificName);
                    utteranceLatin.lang = 'en-US';

                    window.speechSynthesis.speak(utteranceHebrew);
                    window.speechSynthesis.speak(utteranceLatin);
                } else {
                    alert("הדפדפן שלך לא תומך בהקראת טקסט 😢");
                }
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-60 flex items-end md:items-center justify-center p-0 md:p-4 z-50 fade-in" onClick={onClose}>
                    <div className="bg-white rounded-t-3xl md:rounded-3xl p-6 max-w-lg w-full shadow-2xl overflow-y-auto max-h-[85vh] md:max-h-[90vh] relative" onClick={e => e.stopPropagation()}>
                        {/* Mobile drag handle indicator */}
                        <div className="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-4 md:hidden"></div>
                        
                        <div className="flex justify-between items-start mb-4">
                            <h2 className="text-2xl md:text-3xl font-bold text-teal-800 flex flex-wrap items-center gap-2 pr-8">
                                <span>{plant.icon} {plant.name}</span>
                                <button onClick={handleSpeak} className="bg-teal-50 p-2 rounded-full text-teal-600 hover:bg-teal-100 transition-colors shadow-sm active:scale-95 mr-2" title="הקרא שם">
                                    <Icon name="volume-2" className="w-5 h-5" />
                                </button>
                            </h2>
                            <button onClick={onClose} className="text-gray-400 hover:text-red-500 bg-gray-50 p-2 rounded-full absolute top-6 left-6"><Icon name="x" className="w-5 h-5" /></button>
                        </div>
                        <p className="text-gray-500 italic mb-4 text-base md:text-lg">{plant.scientificName} | {plant.family}</p>

                        <div className="w-full h-48 mb-4 rounded-2xl overflow-hidden shadow-inner border border-gray-100 relative group">
                            <img src={plant.imageUrl} alt={plant.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                            <button 
                                onClick={(e) => { e.stopPropagation(); toggleGarden(plant.id); }}
                                className={`absolute bottom-3 right-3 px-4 py-2 rounded-full font-bold shadow-lg transition-all flex items-center gap-2 ${isSaved ? 'bg-green-500 text-white' : 'bg-white/90 text-green-600 hover:bg-white'}`}
                            >
                                <Icon name="flower-2" className="w-5 h-5" />
                                {isSaved ? 'נשמר בגינה' : 'הוסף לגינה'}
                            </button>
                        </div>
                        
                        <div className="grid grid-cols-2 gap-4 mb-4">
                            <div className="bg-pastel-blue p-3 rounded-2xl">
                                <span className="block font-bold mb-1"><Icon name="droplets" className="inline w-4 h-4 mr-1"/> מים (1-3)</span>
                                {Array.from({length: plant.water}).map((_,i) => '💧').join('')}
                            </div>
                            <div className="bg-pastel-yellow p-3 rounded-2xl">
                                <span className="block font-bold mb-1"><Icon name="sun" className="inline w-4 h-4 mr-1"/> שמש (1-3)</span>
                                {Array.from({length: plant.sun}).map((_,i) => '☀️').join('')}
                            </div>
                        </div>

                        <div className="space-y-3 text-gray-700">
                            <p><strong>קטגוריה:</strong> <span className="inline-block bg-pastel-pink px-2 py-1 rounded-full text-sm">{plant.category}</span></p>
                            <p><strong>היסטוריה:</strong> {plant.history}</p>
                            <p><strong>שימושים:</strong> {plant.uses}</p>
                            <p><strong>אדמה מומלצת:</strong> {plant.soil}</p>
                            <p><strong>ריבוי:</strong> {plant.propagation}</p>
                            
                            <div className="bg-red-50 p-4 rounded-3xl border border-red-200 mt-4 shadow-sm text-red-900">
                                <strong className="flex items-center gap-2 mb-1"><Icon name="heart-pulse" className="w-5 h-5 text-red-500"/> מידע בריאותי ורעילות:</strong> 
                                {plant.health}
                            </div>

                            <div className="bg-pastel-green p-4 rounded-3xl border border-green-200 mt-4 shadow-sm">
                                <strong>💡 טיפ בוטני:</strong> {plant.tip}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const PlantCatalog = ({ plants, myGarden, toggleGarden }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('הכל');
            const [selectedPlant, setSelectedPlant] = useState(null);
            const [petSafeOnly, setPetSafeOnly] = useState(false);

            const categories = ['הכל', ...new Set(plants.map(p => p.category))];

            const filteredPlants = useMemo(() => {
                let result = plants.filter(p => {
                    const matchSearch = p.name.includes(searchTerm) || p.scientificName.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchCat = selectedCategory === 'הכל' || p.category === selectedCategory;
                    const matchSafe = petSafeOnly ? p.health.includes('בטוח') : true;
                    return matchSearch && matchCat && matchSafe;
                });
                
                result.sort((a, b) => {
                    if (a.category !== b.category) return a.category.localeCompare(b.category, 'he');
                    return a.name.localeCompare(b.name, 'he');
                });
                
                return result;
            }, [searchTerm, selectedCategory, petSafeOnly, plants]);

            return (
                <div className="fade-in">
                    <div className="bg-white p-4 md:p-6 rounded-3xl shadow-md mb-8 border border-pastel-green">
                        <div className="flex flex-col md:flex-row gap-4">
                            <div className="relative flex-1">
                                <Icon name="search" className="absolute right-4 top-3.5 text-gray-400" />
                                <input 
                                    type="text" 
                                    placeholder="חפש צמחים (עברית או אנגלית)..." 
                                    className="w-full pl-4 pr-12 py-3 rounded-2xl bg-gray-50 border-transparent focus:bg-white focus:border-teal-500 focus:ring-2 focus:ring-teal-200 transition-all outline-none"
                                    value={searchTerm}
                                    onChange={e => setSearchTerm(e.target.value)}
                                />
                            </div>
                            <button 
                                onClick={() => setPetSafeOnly(!petSafeOnly)}
                                className={`px-6 py-3 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all whitespace-nowrap ${petSafeOnly ? 'bg-green-100 text-green-800 border-2 border-green-500 shadow-sm' : 'bg-gray-50 text-gray-500 border-2 border-transparent hover:bg-gray-100'}`}
                            >
                                <Icon name="paw-print" className="w-5 h-5" />
                                בטוח לחיות מחמד
                            </button>
                        </div>
                        
                        <div className="flex gap-2 overflow-x-auto pb-2 mt-4 pt-4 border-t border-gray-100 scrollbar-hide">
                            {categories.map(cat => (
                                <button 
                                    key={cat} 
                                    className={`px-5 py-1.5 rounded-full whitespace-nowrap transition-colors text-sm font-bold ${selectedCategory === cat ? 'bg-teal-600 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-teal-100 hover:text-teal-800'}`}
                                    onClick={() => setSelectedCategory(cat)}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        {filteredPlants.map(plant => (
                            <div key={plant.id} onClick={() => setSelectedPlant(plant)} className="bg-white rounded-3xl p-5 shadow-lg hover:shadow-xl transition-shadow cursor-pointer border border-gray-100 transform hover:-translate-y-1 flex flex-col relative group">
                                {myGarden.includes(plant.id) && (
                                    <div className="absolute top-2 left-2 z-20 bg-green-500 text-white p-1.5 rounded-full shadow-md" title="נמצא בגינה שלי"><Icon name="flower-2" className="w-4 h-4" /></div>
                                )}
                                <div className="w-full h-40 mb-4 rounded-2xl overflow-hidden shadow-inner border border-gray-100 relative">
                                    <div className="absolute top-2 right-2 bg-white/80 backdrop-blur-sm px-2 py-1 rounded-full text-lg shadow-sm z-10">{plant.icon}</div>
                                    <img src={plant.imageUrl} alt={plant.name} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                </div>
                                <h3 className="text-xl font-bold text-center text-teal-900 mb-1">{plant.name}</h3>
                                <p className="text-center text-gray-400 text-sm mb-3 flex-grow">{plant.scientificName}</p>
                                <div className="flex justify-between items-center text-sm mt-auto pt-2 border-t border-gray-50">
                                    <span className="bg-pastel-pink text-pink-900 px-3 py-1 rounded-full font-bold">{plant.category}</span>
                                    <span className="text-teal-600 bg-teal-50 px-3 py-1 rounded-full group-hover:bg-teal-100 transition-colors"><Icon name="info" className="w-4 h-4 inline" /> גלה עוד</span>
                                </div>
                            </div>
                        ))}
                    </div>

                    {filteredPlants.length === 0 && (
                        <div className="text-center py-10 text-gray-500 text-xl">
                            לא נמצאו צמחים התואמים לחיפוש 😢
                        </div>
                    )}

                    <PlantModal plant={selectedPlant} onClose={() => setSelectedPlant(null)} myGarden={myGarden} toggleGarden={toggleGarden} />
                </div>
            );
        };

        const MyGarden = ({ plants, myGarden, toggleGarden }) => {
            const savedPlants = plants.filter(p => myGarden.includes(p.id));
            const [selectedPlant, setSelectedPlant] = useState(null);

            if (savedPlants.length === 0) {
                return (
                    <div className="text-center py-20 fade-in bg-white rounded-3xl shadow-sm border border-dashed border-gray-200 max-w-2xl mx-auto">
                        <div className="text-6xl mb-4">🌱</div>
                        <h2 className="text-2xl font-bold text-gray-700 mb-2">הגינה שלך ריקה!</h2>
                        <p className="text-gray-500 mb-6">עבור לקטלוג או להיכרויות והתחל לאסוף צמחים לגינה האישית שלך.</p>
                    </div>
                );
            }

            return (
                <div className="fade-in">
                    <div className="flex items-center justify-between mb-8 bg-green-50 p-6 rounded-3xl border border-green-100 shadow-sm">
                        <div>
                            <h2 className="text-3xl font-bold text-green-800 flex items-center gap-3">
                                <Icon name="flower-2" className="w-8 h-8" /> הגינה האישית שלי
                            </h2>
                            <p className="text-green-600 mt-2">יש לך {savedPlants.length} צמחים באוסף. כל הכבוד!</p>
                        </div>
                        <div className="hidden md:block text-5xl opacity-80">🪴</div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        {savedPlants.map(plant => (
                            <div key={plant.id} onClick={() => setSelectedPlant(plant)} className="bg-white rounded-3xl p-5 shadow-lg hover:shadow-xl transition-shadow cursor-pointer border border-green-100 transform hover:-translate-y-1 flex flex-col relative group">
                                <button 
                                    onClick={(e) => { e.stopPropagation(); toggleGarden(plant.id); }}
                                    className="absolute top-2 left-2 z-20 bg-red-100 text-red-500 p-2 rounded-full shadow-md hover:bg-red-500 hover:text-white transition-colors"
                                    title="הסר מהגינה"
                                >
                                    <Icon name="trash-2" className="w-4 h-4" />
                                </button>
                                <div className="w-full h-40 mb-4 rounded-2xl overflow-hidden shadow-inner border border-gray-100 relative">
                                    <div className="absolute top-2 right-2 bg-white/80 backdrop-blur-sm px-2 py-1 rounded-full text-lg shadow-sm z-10">{plant.icon}</div>
                                    <img src={plant.imageUrl} alt={plant.name} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                </div>
                                <h3 className="text-xl font-bold text-center text-green-900 mb-1">{plant.name}</h3>
                                
                                <div className="mt-auto pt-4 flex justify-around border-t border-green-50 text-sm">
                                    <div className="flex flex-col items-center text-blue-600" title={`מים: ${plant.water}/3`}>
                                        <Icon name="droplets" className="w-4 h-4 mb-1"/>
                                        <span className="font-bold">{plant.water}</span>
                                    </div>
                                    <div className="flex flex-col items-center text-yellow-500" title={`שמש: ${plant.sun}/3`}>
                                        <Icon name="sun" className="w-4 h-4 mb-1"/>
                                        <span className="font-bold">{plant.sun}</span>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                    <PlantModal plant={selectedPlant} onClose={() => setSelectedPlant(null)} myGarden={myGarden} toggleGarden={toggleGarden} />
                </div>
            );
        };

        const PlantClinic = () => {
            const [step, setStep] = useState(0);
            const [diagnosis, setDiagnosis] = useState(null);

            const symptoms = [
                { id: 'yellow_leaves', label: 'עלים מצהיבים', icon: 'leaf' },
                { id: 'brown_tips', label: 'קצוות חומים ויבשים', icon: 'flame' },
                { id: 'drooping', label: 'הצמח נפול ועצוב', icon: 'arrow-down-right' },
                { id: 'spots', label: 'כתמים על העלים', icon: 'circle-dot' },
                { id: 'bugs', label: 'ברחשים או קורים', icon: 'bug' }
            ];

            const analyzeDiagnosis = (symptom) => {
                const diagnoses = {
                    'yellow_leaves': { title: 'השקיית יתר', text: 'עלים מצהיבים ורכים מעידים לרוב על עודף מים או ניקוז גרוע. בדקו אם האדמה בוצית, ואם כן, תנו לה להתייבש לחלוטין לפני ההשקיה הבאה.', action: 'הפסק להשקות לשבוע' },
                    'brown_tips': { title: 'חוסר לחות או השקיה חסרה', text: 'קצוות קריספיים וחומים אופייניים ליובש - באוויר (בגלל מזגן) או באדמה. ייתכן גם עודף מלחים מהדשן.', action: 'רסס מים סביב הצמח' },
                    'drooping': { title: 'צמא או הלם', text: 'אם האדמה יבשה - הוא פשוט צמא. השקו אותו בנדיבות והוא יזדקף תוך כמה שעות. אם האדמה רטובה, ייתכן שיש ריקבון שורשים המונע קליטת מים.', action: 'בדוק את לחות האדמה' },
                    'spots': { title: 'פטרייה או כווית שמש', text: 'כתמים שחורים ורכים מרמזים על פטרייה (יש להסיר את העלה). כתמים יבשים ולבנים עשויים להיות כוויה משמש ישירה מדי.', action: 'העבר למקום מואר אך ללא שמש ישירה' },
                    'bugs': { title: 'מזיקים (אקריות, כנימות)', text: 'קורים עדינים מעידים על אקריות קוריות (אוהבות יובש). שכבה דביקה או כדורי צמר גפן מעידים על כנימות.', action: 'שטוף במים וסבון או שמן נים' }
                };
                setDiagnosis(diagnoses[symptom]);
                setStep(1);
            };

            const reset = () => {
                setStep(0);
                setDiagnosis(null);
            };

            return (
                <div className="max-w-2xl mx-auto bg-white rounded-3xl p-8 shadow-xl fade-in border-t-8 border-indigo-500">
                    <h2 className="text-3xl font-bold text-center mb-2 text-indigo-900 flex justify-center gap-3">
                        <Icon name="stethoscope" className="w-8 h-8" /> מרפאת הצמחים
                    </h2>
                    <p className="text-center text-gray-500 mb-8">ענה על שאלה פשוטה וקבל אבחון מהיר לבעיה של הצמח שלך</p>

                    {step === 0 && (
                        <div className="fade-in">
                            <h3 className="text-xl font-bold text-gray-800 mb-6 text-center">מה התסמין העיקרי שאתה רואה?</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {symptoms.map(s => (
                                    <button 
                                        key={s.id}
                                        onClick={() => analyzeDiagnosis(s.id)}
                                        className="bg-indigo-50 hover:bg-indigo-100 text-indigo-900 border border-indigo-100 p-4 rounded-2xl flex items-center gap-4 transition-all hover:shadow-md transform hover:-translate-y-1"
                                    >
                                        <div className="bg-white p-3 rounded-full text-indigo-500 shadow-sm"><Icon name={s.icon} className="w-6 h-6" /></div>
                                        <span className="font-bold text-lg">{s.label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {step === 1 && diagnosis && (
                        <div className="fade-in text-center py-6">
                            <div className="w-24 h-24 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                <Icon name="activity" className="w-12 h-12 text-indigo-600" />
                            </div>
                            <h3 className="text-2xl font-bold text-gray-800 mb-4">אבחנה משוערת: <span className="text-indigo-600">{diagnosis.title}</span></h3>
                            <p className="text-lg text-gray-600 mb-8 bg-gray-50 p-6 rounded-2xl border border-gray-100 leading-relaxed">
                                {diagnosis.text}
                            </p>
                            
                            <div className="bg-green-50 p-4 rounded-2xl border border-green-200 mb-8 inline-block px-8">
                                <strong className="text-green-800 block mb-1">פעולה מומלצת:</strong>
                                <span className="text-green-700 font-bold">{diagnosis.action}</span>
                            </div>

                            <div>
                                <button onClick={reset} className="bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 px-8 rounded-full shadow-md transition-all">
                                    <Icon name="rotate-ccw" className="w-5 h-5 inline mr-2" /> בדוק תסמין אחר
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const PlantSwipe = ({ plants, myGarden, toggleGarden }) => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [selectedPlant, setSelectedPlant] = useState(null);
            const [animationDir, setAnimationDir] = useState('');

            const handleLeft = () => {
                setAnimationDir('-translate-x-full -rotate-12 opacity-0');
                setTimeout(() => {
                    setCurrentIndex(prev => (prev + 1) % plants.length);
                    setAnimationDir('');
                }, 300);
            };

            const handleRight = () => {
                setSelectedPlant(plants[currentIndex]);
            };

            const handleCloseModal = () => {
                setSelectedPlant(null);
                setAnimationDir('translate-x-full rotate-12 opacity-0');
                setTimeout(() => {
                    setCurrentIndex(prev => (prev + 1) % plants.length);
                    setAnimationDir('');
                }, 300);
            };

            if (!plants || plants.length === 0) return <div>אין צמחים להצגה</div>;

            const plant = plants[currentIndex];

            return (
                <div className="flex flex-col items-center justify-center py-10 fade-in overflow-hidden relative min-h-[600px]">
                    <h2 className="text-3xl font-bold mb-6 text-pink-800"><Icon name="flame" className="inline mb-1"/> טינדר צמחים</h2>
                    
                    <div className={`relative w-full max-w-sm bg-white rounded-3xl shadow-2xl transition-all duration-300 transform ${animationDir} z-10`}>
                        <div className="w-full h-80 rounded-t-3xl overflow-hidden relative">
                            <img src={plant.imageUrl} alt={plant.name} className="w-full h-full object-cover select-none" draggable="false" />
                            <div className="absolute top-4 right-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-2xl shadow-md">{plant.icon}</div>
                        </div>
                        <div className="p-6 text-center">
                            <h3 className="text-3xl font-bold text-teal-900 mb-2">{plant.name}</h3>
                            <p className="text-gray-500 text-lg mb-4">{plant.scientificName}</p>
                            <span className="bg-pastel-pink text-pink-900 px-4 py-1 rounded-full font-bold text-sm shadow-sm">{plant.category}</span>
                        </div>
                        <div className="flex justify-center gap-12 p-6 pt-0 mt-2">
                            <button onClick={handleLeft} className="w-16 h-16 bg-white border-2 border-red-200 text-red-500 rounded-full flex items-center justify-center hover:bg-red-50 hover:scale-110 transition-all shadow-lg active:scale-95">
                                <Icon name="x" className="w-8 h-8" />
                            </button>
                            <button onClick={handleRight} className="w-16 h-16 bg-white border-2 border-green-200 text-green-500 rounded-full flex items-center justify-center hover:bg-green-50 hover:scale-110 transition-all shadow-lg active:scale-95">
                                <Icon name="heart" className="w-8 h-8" />
                            </button>
                        </div>
                    </div>
                    
                    {/* Background card to give a stack effect */}
                    <div className="absolute w-full max-w-sm h-[500px] bg-white rounded-3xl shadow-md top-24 scale-95 opacity-50 z-0 border border-gray-100"></div>

                    <p className="mt-8 text-gray-500 font-bold text-lg bg-white/80 px-6 py-2 rounded-full shadow-sm">החלק שמאלה להבא, ימינה כדי להתאהב (לגלות פרטים)! 💚</p>
                    
                    <PlantModal plant={selectedPlant} onClose={handleCloseModal} myGarden={myGarden} toggleGarden={toggleGarden} />
                </div>
            );
        };

        const GrowthSimulator = ({ plants }) => {
            const [selectedId, setSelectedId] = useState(plants[0].id);
            const [waterLvl, setWaterLvl] = useState(0);
            const [sunLvl, setSunLvl] = useState(0);
            const [status, setStatus] = useState(null);

            const plant = plants.find(p => p.id == selectedId);

            const handleSimulate = () => {
                let msg = '';
                let type = '';

                if (waterLvl === plant.water && sunLvl === plant.sun) {
                    msg = 'שילוב מושלם! הצמח משגשג ופורח 🌸';
                    type = 'success';
                } else if (waterLvl > plant.water + 1) {
                    msg = 'יותר מדי מים! השורשים נרקבים 🥀';
                    type = 'error';
                } else if (waterLvl < plant.water - 1) {
                    msg = 'הצמח צמא מדי! העלים מתייבשים 🍂';
                    type = 'error';
                } else if (sunLvl > plant.sun) {
                    msg = 'יותר מדי שמש! העלים נשרפים 🔥';
                    type = 'error';
                } else if (sunLvl < plant.sun - 1) {
                    msg = 'חסר אור! הצמח לא מתפתח היטב וצבעיו דוהים 🌑';
                    type = 'error';
                } else {
                    msg = 'תנאים סבירים, אך הצמח יכול לשגשג יותר בתנאים מדויקים יותר 🌱';
                    type = 'warning';
                }

                setStatus({ msg, type });
            };

            const isIdeal = waterLvl === plant.water && sunLvl === plant.sun;

            return (
                <div className="max-w-2xl mx-auto bg-white rounded-3xl p-8 shadow-xl fade-in border-4 border-pastel-blue relative">
                    <style>{`
                        .svg-container {
                            width: 100%;
                            max-width: 400px;
                            margin: 0 auto 20px auto;
                            aspect-ratio: 4 / 3;
                            border-radius: 20px;
                            overflow: hidden;
                            background-color: #F4F1E1;
                            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
                        }
                        
                        .plant-group {
                            cursor: pointer;
                        }
                        
                        .stem {
                            stroke-dasharray: 280;
                            stroke-dashoffset: 210;
                            transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
                        }

                        .leaf-wrapper {
                            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
                        }

                        /* Base states */
                        .leaf-1 { transform: scale(0.4); opacity: 1; }
                        .leaf-2 { transform: scale(0); opacity: 0; }
                        .leaf-3 { transform: scale(0); opacity: 0; }
                        .leaf-4 { transform: scale(0); opacity: 0; }

                        /* Ideal States (Triggered by class instead of hover) */
                        .is-ideal .stem {
                            stroke-dashoffset: 0; 
                        }

                        .is-ideal .leaf-1 {
                            transform: scale(1);
                            transition-delay: 0.1s;
                        }

                        .is-ideal .leaf-2 {
                            transform: scale(1);
                            opacity: 1;
                            transition-delay: 0.25s;
                        }

                        .is-ideal .leaf-3 {
                            transform: scale(1);
                            opacity: 1;
                            transition-delay: 0.45s;
                        }

                        .is-ideal .leaf-4 {
                            transform: scale(1);
                            opacity: 1;
                            transition-delay: 0.65s;
                        }
                    `}</style>

                    <h2 className="text-3xl font-bold text-center mb-6 text-teal-800 flex justify-center gap-3">
                        <Icon name="flask-conical" /> סימולטור גידול בוטני
                    </h2>

                    <div className="svg-container">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
                            <defs>
                                <g id="leaf">
                                    <path d="M 0 0 C 15 -25 45 -25 55 -5 Z" fill="#9DB469" />
                                    <path d="M 0 0 L 55 -5 C 45 15 15 15 0 0 Z" fill="#5A7135" />
                                </g>
                            </defs>

                            <rect width="800" height="600" fill="#F4F1E1" />
                            <circle cx="400" cy="320" r="150" fill="#EAE0C5" />
                            <ellipse cx="400" cy="525" rx="100" ry="14" fill="#DFD3B8" />

                            <g id="pot">
                                <path d="M 330 400 L 400 400 L 400 525 C 370 525 355 525 350 510 Z" fill="#D98A6C" />
                                <path d="M 400 400 L 470 400 L 450 510 C 445 525 430 525 400 525 Z" fill="#C26E53" />
                                <path d="M 315 383 A 8 8 0 0 1 323 375 L 400 375 L 400 400 L 315 400 Z" fill="#E2977A" />
                                <path d="M 400 375 L 477 375 A 8 8 0 0 1 485 383 L 485 400 L 400 400 Z" fill="#CC765B" />
                                <path d="M 345 375 A 55 12 0 0 1 455 375 Z" fill="#54433A" />
                            </g>

                            <g className={`plant-group ${isIdeal ? 'is-ideal' : ''}`}>
                                <path className="stem" d="M 400 375 Q 370 245 410 115" fill="none" stroke="#5A7135" strokeWidth="12" strokeLinecap="round" />
                                
                                <g className="leaf-wrapper leaf-1" style={{ transformOrigin: '390px 320px' }}>
                                    <use href="#leaf" x="390" y="320" transform="rotate(-25 390 320) scale(1.3)" />
                                </g>

                                <g className="leaf-wrapper leaf-2" style={{ transformOrigin: '385px 230px' }}>
                                    <use href="#leaf" x="385" y="230" transform="rotate(-160 385 230) scale(1.1)" />
                                </g>

                                <g className="leaf-wrapper leaf-3" style={{ transformOrigin: '400px 160px' }}>
                                    <use href="#leaf" x="400" y="160" transform="rotate(-15 400 160) scale(0.9)" />
                                </g>

                                <g className="leaf-wrapper leaf-4" style={{ transformOrigin: '410px 115px' }}>
                                    <use href="#leaf" x="410" y="115" transform="rotate(-140 410 115) scale(0.8)" />
                                </g>
                            </g>
                        </svg>
                    </div>
                    
                    <div className="mb-6">
                        <label className="block text-gray-700 font-bold mb-2">בחר צמח לניסוי:</label>
                        <select 
                            className="w-full p-3 rounded-2xl border-2 border-pastel-green focus:outline-none"
                            value={selectedId}
                            onChange={(e) => { setSelectedId(e.target.value); setStatus(null); }}
                        >
                            {plants.map(p => <option key={p.id} value={p.id}>{p.icon} {p.name}</option>)}
                        </select>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                        <div className="bg-blue-50 p-6 rounded-3xl text-center">
                            <h3 className="font-bold text-blue-800 mb-4 text-xl"><Icon name="droplets" className="inline"/> רמת השקיה</h3>
                            <input type="range" min="0" max="6" value={waterLvl} onChange={e => setWaterLvl(Number(e.target.value))} className="w-full accent-blue-500 mb-2"/>
                            <div className="text-3xl font-bold text-blue-600">{waterLvl}</div>
                        </div>
                        <div className="bg-yellow-50 p-6 rounded-3xl text-center">
                            <h3 className="font-bold text-yellow-800 mb-4 text-xl"><Icon name="sun" className="inline"/> חשיפה לשמש</h3>
                            <input type="range" min="0" max="6" value={sunLvl} onChange={e => setSunLvl(Number(e.target.value))} className="w-full accent-yellow-500 mb-2"/>
                            <div className="text-3xl font-bold text-yellow-600">{sunLvl}</div>
                        </div>
                    </div>

                    <button 
                        onClick={handleSimulate}
                        className="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 rounded-3xl text-xl transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1"
                    >
                        בדוק תוצאות
                    </button>

                    {status && (
                        <div className={`mt-6 p-6 rounded-3xl text-center text-xl font-bold fade-in shadow-inner ${status.type === 'success' ? 'bg-green-100 text-green-800 border-2 border-green-300' : status.type === 'error' ? 'bg-red-100 text-red-800 border-2 border-red-300' : 'bg-yellow-100 text-yellow-800 border-2 border-yellow-300'}`}>
                            {status.msg}
                        </div>
                    )}
                </div>
            );
        };

        const AdvancedTrivia = ({ plants }) => {
            const [currentQ, setCurrentQ] = useState(0);
            const [score, setScore] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [questions, setQuestions] = useState([]);
            const [feedback, setFeedback] = useState(null); // 'correct' or 'wrong'

            const generateQuestions = () => {
                const qList = [];
                const getRandomPlants = (count, exclude) => {
                    const pool = plants.filter(p => p.name !== exclude);
                    const result = [];
                    for(let i=0; i<count; i++) {
                        if(pool.length === 0) break;
                        const idx = Math.floor(Math.random() * pool.length);
                        result.push(pool.splice(idx, 1)[0]);
                    }
                    return result;
                };

                for(let i=0; i<5; i++) {
                    const p = plants[Math.floor(Math.random() * plants.length)];
                    const qType = Math.floor(Math.random() * 5);
                    
                    let qText, ans, wrongOpts;

                    if (qType === 0) {
                        qText = `לאיזו משפחה בוטנית שייך הצמח ${p.name}?`;
                        ans = p.family;
                        wrongOpts = ['סחלביים', 'ורדיים', 'שפתניים', 'לופיים', 'אספרגיים', 'צבריים'].filter(f => f !== ans).sort(() => Math.random() - 0.5).slice(0, 3);
                    } else if (qType === 1) {
                        qText = `מהו שמו המדעי של ${p.name}?`;
                        ans = p.scientificName;
                        wrongOpts = getRandomPlants(3, p.name).map(x => x.scientificName);
                    } else if (qType === 2) {
                        qText = `איזה מבין הצמחים הבאים מוגדר כ"${p.category}"?`;
                        ans = p.name;
                        wrongOpts = plants.filter(x => x.category !== p.category).sort(() => Math.random() - 0.5).slice(0, 3).map(x => x.name);
                    } else if (qType === 3) {
                        const tox = p.health.includes('רעיל') ? 'רעיל' : 'בטוח לחלוטין';
                        qText = `האם ${p.name} בטוח לחיות מחמד או רעיל?`;
                        ans = tox;
                        wrongOpts = [tox === 'רעיל' ? 'בטוח לחלוטין' : 'רעיל', 'לא ידוע', 'תלוי בעונה'];
                    } else {
                        qText = `מיהו הצמח שעליו נאמר: "${p.history.split('.')[0]}..."?`;
                        ans = p.name;
                        wrongOpts = getRandomPlants(3, p.name).map(x => x.name);
                    }

                    const opts = [ans, ...wrongOpts].sort(() => Math.random() - 0.5);
                    qList.push({ q: qText, opts, ans, image: p.imageUrl });
                }
                setQuestions(qList);
            };

            useEffect(() => {
                generateQuestions();
            }, [plants]);

            const handleAns = (opt) => {
                const isCorrect = opt === questions[currentQ].ans;
                if (isCorrect) {
                    setScore(s => s + 1);
                    setFeedback('correct');
                } else {
                    setFeedback('wrong');
                }

                setTimeout(() => {
                    setFeedback(null);
                    if (currentQ < questions.length - 1) {
                        setCurrentQ(q => q + 1);
                    } else {
                        setShowResult(true);
                    }
                }, 1000);
            };

            const reset = () => {
                setCurrentQ(0);
                setScore(0);
                setShowResult(false);
                generateQuestions();
            };

            if (questions.length === 0) return <div className="text-center py-10">טוען חידון...</div>;

            return (
                <div className="max-w-2xl mx-auto bg-white rounded-3xl p-6 md:p-10 shadow-2xl fade-in text-center border-t-8 border-pastel-pink relative overflow-hidden">
                    {/* Visual Feedback Overlay */}
                    {feedback === 'correct' && <div className="absolute inset-0 bg-green-500/20 z-10 flex items-center justify-center animate-pulse"><Icon name="check-circle" className="w-32 h-32 text-green-600 drop-shadow-lg" /></div>}
                    {feedback === 'wrong' && <div className="absolute inset-0 bg-red-500/20 z-10 flex items-center justify-center animate-pulse"><Icon name="x-circle" className="w-32 h-32 text-red-600 drop-shadow-lg" /></div>}

                    <h2 className="text-3xl font-bold mb-6 text-pink-800"><Icon name="brain" className="inline mb-1"/> חידון בוטניקה מתקדם</h2>
                    
                    {!showResult ? (
                        <div>
                            <div className="flex justify-between text-gray-500 mb-4 font-bold">
                                <span>שאלה {currentQ + 1} מתוך {questions.length}</span>
                                <span className="text-teal-600">ניקוד: {score}</span>
                            </div>
                            
                            <div className="w-full h-40 md:h-56 mb-6 rounded-2xl overflow-hidden shadow-inner border border-gray-100">
                                <img src={questions[currentQ].image} alt="Hint" className="w-full h-full object-cover blur-[2px] hover:blur-none transition-all duration-500" />
                            </div>

                            <h3 className="text-2xl font-bold text-gray-800 mb-8 leading-snug">{questions[currentQ].q}</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {questions[currentQ].opts.map((opt, i) => (
                                    <button 
                                        key={i}
                                        onClick={() => handleAns(opt)}
                                        disabled={feedback !== null}
                                        className="w-full bg-pastel-blue hover:bg-teal-200 text-teal-900 font-bold py-4 px-4 rounded-3xl text-lg transition-all shadow-sm active:scale-95 disabled:opacity-50"
                                    >
                                        {opt}
                                    </button>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="py-10 fade-in">
                            <Icon name="trophy" className="w-24 h-24 text-yellow-400 mx-auto mb-4" />
                            <h3 className="text-4xl font-bold text-teal-600 mb-4">
                                {score === questions.length ? 'מושלם! אתה פרופסור לבוטניקה 🎓' : score >= 3 ? 'כל הכבוד! יש לך אצבעות ירוקות 🌿' : 'אוי, אולי עדיף שתגדל קקטוסים מפלסטיק... 🌵'}
                            </h3>
                            <p className="text-2xl mb-8 font-bold text-gray-700">הציון הסופי שלך: {score} מתוך {questions.length}</p>
                            <button onClick={reset} className="bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 px-10 text-xl rounded-full shadow-lg transition-transform hover:scale-105 active:scale-95">
                                שחק שוב! 🔄
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('catalog');
            const [myGarden, setMyGarden] = useState(() => {
                const saved = localStorage.getItem('myGarden');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => {
                localStorage.setItem('myGarden', JSON.stringify(myGarden));
            }, [myGarden]);

            const toggleGarden = (plantId) => {
                setMyGarden(prev => 
                    prev.includes(plantId) ? prev.filter(id => id !== plantId) : [...prev, plantId]
                );
            };

            return (
                <div>
                    <header className="bg-teal-800 text-white p-8 rounded-b-[3rem] shadow-xl mb-10 text-center relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-full bg-black opacity-10 blur-xl"></div>
                        <h1 className="text-5xl font-bold mb-4 flex justify-center items-center gap-4 relative z-10">
                            <Icon name="leaf" className="w-12 h-12 text-pastel-green" /> 
                            בוטניקה-פדיה
                        </h1>
                        <p className="text-teal-200 text-lg relative z-10">המרחב המושלם ללמוד, לחקור ולטפח את הגינה שלך</p>
                    </header>

                    <nav className="flex justify-center gap-4 mb-10 px-4 flex-wrap sticky top-4 z-40 bg-white/80 backdrop-blur-md p-4 rounded-full mx-auto max-w-4xl shadow-sm border border-gray-100">
                        <button onClick={() => setActiveTab('catalog')} className={`px-6 py-2.5 rounded-full font-bold transition-all flex items-center gap-2 ${activeTab === 'catalog' ? 'bg-teal-600 text-white shadow-md transform scale-105' : 'bg-transparent text-teal-800 hover:bg-teal-50'}`}>
                            <Icon name="library" className="w-5 h-5" /> קטלוג
                        </button>
                        <button onClick={() => setActiveTab('garden')} className={`px-6 py-2.5 rounded-full font-bold transition-all flex items-center gap-2 ${activeTab === 'garden' ? 'bg-green-500 text-white shadow-md transform scale-105' : 'bg-transparent text-green-700 hover:bg-green-50'}`}>
                            <Icon name="flower-2" className="w-5 h-5" /> הגינה שלי <span className="bg-white text-green-600 text-xs px-2 py-0.5 rounded-full ml-1">{myGarden.length}</span>
                        </button>
                        <button onClick={() => setActiveTab('clinic')} className={`px-6 py-2.5 rounded-full font-bold transition-all flex items-center gap-2 ${activeTab === 'clinic' ? 'bg-indigo-500 text-white shadow-md transform scale-105' : 'bg-transparent text-indigo-600 hover:bg-indigo-50'}`}>
                            <Icon name="stethoscope" className="w-5 h-5" /> מרפאה
                        </button>
                        <button onClick={() => setActiveTab('swipe')} className={`px-6 py-2.5 rounded-full font-bold transition-all flex items-center gap-2 ${activeTab === 'swipe' ? 'bg-pink-500 text-white shadow-md transform scale-105' : 'bg-transparent text-pink-600 hover:bg-pink-50'}`}>
                            <Icon name="flame" className="w-5 h-5" /> היכרויות 
                        </button>
                        <button onClick={() => setActiveTab('simulator')} className={`px-6 py-2.5 rounded-full font-bold transition-all flex items-center gap-2 ${activeTab === 'simulator' ? 'bg-yellow-500 text-white shadow-md transform scale-105' : 'bg-transparent text-yellow-700 hover:bg-yellow-50'}`}>
                            <Icon name="sprout" className="w-5 h-5" /> סימולטור
                        </button>
                        <button onClick={() => setActiveTab('trivia')} className={`px-6 py-2.5 rounded-full font-bold transition-all flex items-center gap-2 ${activeTab === 'trivia' ? 'bg-purple-500 text-white shadow-md transform scale-105' : 'bg-transparent text-purple-700 hover:bg-purple-50'}`}>
                            <Icon name="gamepad-2" className="w-5 h-5" /> חידון
                        </button>
                    </nav>

                    <main className="container mx-auto px-4 pb-20">
                        {activeTab === 'catalog' && <PlantCatalog plants={plantDatabase} myGarden={myGarden} toggleGarden={toggleGarden} />}
                        {activeTab === 'garden' && <MyGarden plants={plantDatabase} myGarden={myGarden} toggleGarden={toggleGarden} />}
                        {activeTab === 'clinic' && <PlantClinic />}
                        {activeTab === 'swipe' && <PlantSwipe plants={plantDatabase} myGarden={myGarden} toggleGarden={toggleGarden} />}
                        {activeTab === 'simulator' && <GrowthSimulator plants={plantDatabase} />}
                        {activeTab === 'trivia' && <AdvancedTrivia plants={plantDatabase} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
