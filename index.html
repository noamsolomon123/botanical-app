<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אפליקציה בוטנית חינוכית</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Data Source -->
    <script src="data.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts: Varela Round -->
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Varela Round', sans-serif;
            background-color: #fdfbf7; /* Pastel background */
            color: #333;
        }
        
        .pastel-card {
            background: linear-gradient(135deg, #e0f2f1 0%, #b2dfdb 100%);
        }

        .pastel-accent {
            background-color: #ffd54f;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pastel: {
                            green: '#A8E6CF',
                            blue: '#DCEDC1',
                            pink: '#FFD3B6',
                            orange: '#FFAAA5',
                            red: '#FF8B94',
                            yellow: '#FDFFB6'
                        }
                    },
                    borderRadius: {
                        '3xl': '1.5rem',
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen pb-10">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Database ---
        // plantDatabase is loaded from data.js

        // --- Icons ---
        const Icon = ({ name, className }) => {
            useEffect(() => {
                lucide.createIcons();
            });
            return <i data-lucide={name} className={className}></i>;
        };

        // --- Components ---
        const PlantModal = ({ plant, onClose }) => {
            if (!plant) return null;

            const handleSpeak = (e) => {
                e.stopPropagation();
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); // Stop any current speech
                    const utteranceHebrew = new SpeechSynthesisUtterance(plant.name);
                    utteranceHebrew.lang = 'he-IL';
                    
                    const utteranceLatin = new SpeechSynthesisUtterance(plant.scientificName);
                    utteranceLatin.lang = 'en-US';

                    window.speechSynthesis.speak(utteranceHebrew);
                    window.speechSynthesis.speak(utteranceLatin);
                } else {
                    alert("הדפדפן שלך לא תומך בהקראת טקסט 😢");
                }
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-60 flex items-end md:items-center justify-center p-0 md:p-4 z-50 fade-in" onClick={onClose}>
                    <div className="bg-white rounded-t-3xl md:rounded-3xl p-6 max-w-lg w-full shadow-2xl overflow-y-auto max-h-[85vh] md:max-h-[90vh]" onClick={e => e.stopPropagation()}>
                        {/* Mobile drag handle indicator */}
                        <div className="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-4 md:hidden"></div>
                        
                        <div className="flex justify-between items-start mb-4">
                            <h2 className="text-2xl md:text-3xl font-bold text-teal-800 flex flex-wrap items-center gap-2">
                                <span>{plant.icon} {plant.name}</span>
                                <button onClick={handleSpeak} className="ml-auto bg-teal-50 p-2 rounded-full text-teal-600 hover:bg-teal-100 transition-colors shadow-sm active:scale-95" title="הקרא שם">
                                    <Icon name="volume-2" className="w-5 h-5" />
                                </button>
                            </h2>
                            <button onClick={onClose} className="text-gray-400 hover:text-red-500 bg-gray-50 p-2 rounded-full"><Icon name="x" className="w-5 h-5" /></button>
                        </div>
                        <p className="text-gray-500 italic mb-4 text-base md:text-lg">{plant.scientificName} | {plant.family}</p>

                        <div className="w-full h-48 mb-4 rounded-2xl overflow-hidden shadow-inner border border-gray-100">
                            <img src={plant.imageUrl} alt={plant.name} className="w-full h-full object-cover hover:scale-105 transition-transform duration-500" />
                        </div>
                        
                        <div className="grid grid-cols-2 gap-4 mb-4">
                            <div className="bg-pastel-blue p-3 rounded-2xl">
                                <span className="block font-bold mb-1"><Icon name="droplets" className="inline w-4 h-4 mr-1"/> מים (1-3)</span>
                                {Array.from({length: plant.water}).map((_,i) => '💧').join('')}
                            </div>
                            <div className="bg-pastel-yellow p-3 rounded-2xl">
                                <span className="block font-bold mb-1"><Icon name="sun" className="inline w-4 h-4 mr-1"/> שמש (1-3)</span>
                                {Array.from({length: plant.sun}).map((_,i) => '☀️').join('')}
                            </div>
                        </div>

                        <div className="space-y-3 text-gray-700">
                            <p><strong>קטגוריה:</strong> <span className="inline-block bg-pastel-pink px-2 py-1 rounded-full text-sm">{plant.category}</span></p>
                            <p><strong>היסטוריה:</strong> {plant.history}</p>
                            <p><strong>שימושים:</strong> {plant.uses}</p>
                            <p><strong>אדמה מומלצת:</strong> {plant.soil}</p>
                            <p><strong>ריבוי:</strong> {plant.propagation}</p>
                            
                            <div className="bg-red-50 p-4 rounded-3xl border border-red-200 mt-4 shadow-sm text-red-900">
                                <strong className="flex items-center gap-2 mb-1"><Icon name="heart-pulse" className="w-5 h-5 text-red-500"/> מידע בריאותי ורעילות:</strong> 
                                {plant.health}
                            </div>

                            <div className="bg-pastel-green p-4 rounded-3xl border border-green-200 mt-4 shadow-sm">
                                <strong>💡 טיפ בוטני:</strong> {plant.tip}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const PlantCatalog = ({ plants }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedCategory, setSelectedCategory] = useState('הכל');
            const [selectedPlant, setSelectedPlant] = useState(null);

            const categories = ['הכל', ...new Set(plants.map(p => p.category))];

            const filteredPlants = useMemo(() => {
                let result = plants.filter(p => {
                    const matchSearch = p.name.includes(searchTerm) || p.scientificName.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchCat = selectedCategory === 'הכל' || p.category === selectedCategory;
                    return matchSearch && matchCat;
                });
                
                result.sort((a, b) => {
                    if (a.category !== b.category) return a.category.localeCompare(b.category, 'he');
                    return a.name.localeCompare(b.name, 'he');
                });
                
                return result;
            }, [searchTerm, selectedCategory, plants]);

            return (
                <div className="fade-in">
                    <div className="flex flex-col md:flex-row gap-4 mb-8">
                        <div className="relative flex-1">
                            <Icon name="search" className="absolute right-4 top-3 text-gray-400" />
                            <input 
                                type="text" 
                                placeholder="חפש צמחים (עברית או אנגלית)..." 
                                className="w-full pl-4 pr-12 py-3 rounded-3xl border-2 border-pastel-green focus:outline-none focus:border-teal-500 shadow-sm"
                                value={searchTerm}
                                onChange={e => setSearchTerm(e.target.value)}
                            />
                        </div>
                        <div className="flex gap-2 overflow-x-auto pb-2">
                            {categories.map(cat => (
                                <button 
                                    key={cat} 
                                    className={`px-6 py-2 rounded-3xl whitespace-nowrap transition-colors ${selectedCategory === cat ? 'bg-teal-600 text-white shadow-md' : 'bg-white border-2 border-teal-100 hover:bg-pastel-green'}`}
                                    onClick={() => setSelectedCategory(cat)}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        {filteredPlants.map(plant => (
                            <div key={plant.id} onClick={() => setSelectedPlant(plant)} className="bg-white rounded-3xl p-5 shadow-lg hover:shadow-xl transition-shadow cursor-pointer border border-gray-100 transform hover:-translate-y-1 flex flex-col">
                                <div className="w-full h-40 mb-4 rounded-2xl overflow-hidden shadow-inner border border-gray-100 relative">
                                    <div className="absolute top-2 right-2 bg-white/80 backdrop-blur-sm px-2 py-1 rounded-full text-lg shadow-sm z-10">{plant.icon}</div>
                                    <img src={plant.imageUrl} alt={plant.name} className="w-full h-full object-cover hover:scale-110 transition-transform duration-700" />
                                </div>
                                <h3 className="text-xl font-bold text-center text-teal-900 mb-1">{plant.name}</h3>
                                <p className="text-center text-gray-400 text-sm mb-3 flex-grow">{plant.scientificName}</p>
                                <div className="flex justify-between items-center text-sm mt-auto pt-2 border-t border-gray-50">
                                    <span className="bg-pastel-pink text-pink-900 px-3 py-1 rounded-full font-bold">{plant.category}</span>
                                    <span className="text-teal-600 bg-teal-50 px-3 py-1 rounded-full hover:bg-teal-100 transition-colors"><Icon name="info" className="w-4 h-4 inline" /> גלה עוד</span>
                                </div>
                            </div>
                        ))}
                    </div>

                    {filteredPlants.length === 0 && (
                        <div className="text-center py-10 text-gray-500 text-xl">
                            לא נמצאו צמחים התואמים לחיפוש 😢
                        </div>
                    )}

                    <PlantModal plant={selectedPlant} onClose={() => setSelectedPlant(null)} />
                </div>
            );
        };

        const PlantSwipe = ({ plants }) => {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [selectedPlant, setSelectedPlant] = useState(null);
            const [animationDir, setAnimationDir] = useState('');

            const handleLeft = () => {
                setAnimationDir('-translate-x-full -rotate-12 opacity-0');
                setTimeout(() => {
                    setCurrentIndex(prev => (prev + 1) % plants.length);
                    setAnimationDir('');
                }, 300);
            };

            const handleRight = () => {
                setSelectedPlant(plants[currentIndex]);
            };

            const handleCloseModal = () => {
                setSelectedPlant(null);
                setAnimationDir('translate-x-full rotate-12 opacity-0');
                setTimeout(() => {
                    setCurrentIndex(prev => (prev + 1) % plants.length);
                    setAnimationDir('');
                }, 300);
            };

            if (!plants || plants.length === 0) return <div>אין צמחים להצגה</div>;

            const plant = plants[currentIndex];

            return (
                <div className="flex flex-col items-center justify-center py-10 fade-in overflow-hidden relative min-h-[600px]">
                    <h2 className="text-3xl font-bold mb-6 text-pink-800"><Icon name="flame" className="inline mb-1"/> טינדר צמחים</h2>
                    
                    <div className={`relative w-full max-w-sm bg-white rounded-3xl shadow-2xl transition-all duration-300 transform ${animationDir} z-10`}>
                        <div className="w-full h-80 rounded-t-3xl overflow-hidden relative">
                            <img src={plant.imageUrl} alt={plant.name} className="w-full h-full object-cover select-none" draggable="false" />
                            <div className="absolute top-4 right-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full text-2xl shadow-md">{plant.icon}</div>
                        </div>
                        <div className="p-6 text-center">
                            <h3 className="text-3xl font-bold text-teal-900 mb-2">{plant.name}</h3>
                            <p className="text-gray-500 text-lg mb-4">{plant.scientificName}</p>
                            <span className="bg-pastel-pink text-pink-900 px-4 py-1 rounded-full font-bold text-sm shadow-sm">{plant.category}</span>
                        </div>
                        <div className="flex justify-center gap-12 p-6 pt-0 mt-2">
                            <button onClick={handleLeft} className="w-16 h-16 bg-white border-2 border-red-200 text-red-500 rounded-full flex items-center justify-center hover:bg-red-50 hover:scale-110 transition-all shadow-lg active:scale-95">
                                <Icon name="x" className="w-8 h-8" />
                            </button>
                            <button onClick={handleRight} className="w-16 h-16 bg-white border-2 border-green-200 text-green-500 rounded-full flex items-center justify-center hover:bg-green-50 hover:scale-110 transition-all shadow-lg active:scale-95">
                                <Icon name="heart" className="w-8 h-8" />
                            </button>
                        </div>
                    </div>
                    
                    {/* Background card to give a stack effect */}
                    <div className="absolute w-full max-w-sm h-[500px] bg-white rounded-3xl shadow-md top-24 scale-95 opacity-50 z-0 border border-gray-100"></div>

                    <p className="mt-8 text-gray-500 font-bold text-lg bg-white/80 px-6 py-2 rounded-full shadow-sm">החלק שמאלה להבא, ימינה כדי להתאהב (לגלות פרטים)! 💚</p>
                    
                    <PlantModal plant={selectedPlant} onClose={handleCloseModal} />
                </div>
            );
        };

        const GrowthSimulator = ({ plants }) => {
            const [selectedId, setSelectedId] = useState(plants[0].id);
            const [waterLvl, setWaterLvl] = useState(0);
            const [sunLvl, setSunLvl] = useState(0);
            const [status, setStatus] = useState(null);

            const plant = plants.find(p => p.id == selectedId);

            const handleSimulate = () => {
                let msg = '';
                let type = '';

                if (waterLvl === plant.water && sunLvl === plant.sun) {
                    msg = 'שילוב מושלם! הצמח משגשג ופורח 🌸';
                    type = 'success';
                } else if (waterLvl > plant.water + 1) {
                    msg = 'יותר מדי מים! השורשים נרקבים 🥀';
                    type = 'error';
                } else if (waterLvl < plant.water - 1) {
                    msg = 'הצמח צמא מדי! העלים מתייבשים 🍂';
                    type = 'error';
                } else if (sunLvl > plant.sun) {
                    msg = 'יותר מדי שמש! העלים נשרפים 🔥';
                    type = 'error';
                } else if (sunLvl < plant.sun - 1) {
                    msg = 'חסר אור! הצמח לא מתפתח היטב וצבעיו דוהים 🌑';
                    type = 'error';
                } else {
                    msg = 'תנאים סבירים, אך הצמח יכול לשגשג יותר בתנאים מדויקים יותר 🌱';
                    type = 'warning';
                }

                setStatus({ msg, type });
            };

            return (
                <div className="max-w-2xl mx-auto bg-white rounded-3xl p-8 shadow-xl fade-in border-4 border-pastel-blue">
                    <h2 className="text-3xl font-bold text-center mb-6 text-teal-800 flex justify-center gap-3">
                        <Icon name="flask-conical" /> סימולטור גידול בוטני
                    </h2>
                    
                    <div className="mb-6">
                        <label className="block text-gray-700 font-bold mb-2">בחר צמח לניסוי:</label>
                        <select 
                            className="w-full p-3 rounded-2xl border-2 border-pastel-green focus:outline-none"
                            value={selectedId}
                            onChange={(e) => { setSelectedId(e.target.value); setStatus(null); }}
                        >
                            {plants.map(p => <option key={p.id} value={p.id}>{p.icon} {p.name}</option>)}
                        </select>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                        <div className="bg-blue-50 p-6 rounded-3xl text-center">
                            <h3 className="font-bold text-blue-800 mb-4 text-xl"><Icon name="droplets" className="inline"/> רמת השקיה</h3>
                            <input type="range" min="0" max="6" value={waterLvl} onChange={e => setWaterLvl(Number(e.target.value))} className="w-full accent-blue-500 mb-2"/>
                            <div className="text-3xl font-bold text-blue-600">{waterLvl}</div>
                        </div>
                        <div className="bg-yellow-50 p-6 rounded-3xl text-center">
                            <h3 className="font-bold text-yellow-800 mb-4 text-xl"><Icon name="sun" className="inline"/> חשיפה לשמש</h3>
                            <input type="range" min="0" max="6" value={sunLvl} onChange={e => setSunLvl(Number(e.target.value))} className="w-full accent-yellow-500 mb-2"/>
                            <div className="text-3xl font-bold text-yellow-600">{sunLvl}</div>
                        </div>
                    </div>

                    <button 
                        onClick={handleSimulate}
                        className="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 rounded-3xl text-xl transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1"
                    >
                        בדוק תוצאות
                    </button>

                    {status && (
                        <div className={`mt-6 p-6 rounded-3xl text-center text-xl font-bold fade-in shadow-inner ${status.type === 'success' ? 'bg-green-100 text-green-800 border-2 border-green-300' : status.type === 'error' ? 'bg-red-100 text-red-800 border-2 border-red-300' : 'bg-yellow-100 text-yellow-800 border-2 border-yellow-300'}`}>
                            {status.msg}
                        </div>
                    )}
                </div>
            );
        };

        const AdvancedTrivia = ({ plants }) => {
            const [currentQ, setCurrentQ] = useState(0);
            const [score, setScore] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [questions, setQuestions] = useState([]);
            const [feedback, setFeedback] = useState(null); // 'correct' or 'wrong'

            const generateQuestions = () => {
                const qList = [];
                const getRandomPlants = (count, exclude) => {
                    const pool = plants.filter(p => p.name !== exclude);
                    const result = [];
                    for(let i=0; i<count; i++) {
                        if(pool.length === 0) break;
                        const idx = Math.floor(Math.random() * pool.length);
                        result.push(pool.splice(idx, 1)[0]);
                    }
                    return result;
                };

                for(let i=0; i<5; i++) {
                    const p = plants[Math.floor(Math.random() * plants.length)];
                    const qType = Math.floor(Math.random() * 5);
                    
                    let qText, ans, wrongOpts;

                    if (qType === 0) {
                        qText = `לאיזו משפחה בוטנית שייך הצמח ${p.name}?`;
                        ans = p.family;
                        wrongOpts = ['סחלביים', 'ורדיים', 'שפתניים', 'לופיים', 'אספרגיים', 'צבריים'].filter(f => f !== ans).sort(() => Math.random() - 0.5).slice(0, 3);
                    } else if (qType === 1) {
                        qText = `מהו שמו המדעי של ${p.name}?`;
                        ans = p.scientificName;
                        wrongOpts = getRandomPlants(3, p.name).map(x => x.scientificName);
                    } else if (qType === 2) {
                        qText = `איזה מבין הצמחים הבאים מוגדר כ"${p.category}"?`;
                        ans = p.name;
                        wrongOpts = plants.filter(x => x.category !== p.category).sort(() => Math.random() - 0.5).slice(0, 3).map(x => x.name);
                    } else if (qType === 3) {
                        const tox = p.health.includes('רעיל') ? 'רעיל' : 'בטוח לחלוטין';
                        qText = `האם ${p.name} בטוח לחיות מחמד או רעיל?`;
                        ans = tox;
                        wrongOpts = [tox === 'רעיל' ? 'בטוח לחלוטין' : 'רעיל', 'לא ידוע', 'תלוי בעונה'];
                    } else {
                        qText = `מיהו הצמח שעליו נאמר: "${p.history.split('.')[0]}..."?`;
                        ans = p.name;
                        wrongOpts = getRandomPlants(3, p.name).map(x => x.name);
                    }

                    const opts = [ans, ...wrongOpts].sort(() => Math.random() - 0.5);
                    qList.push({ q: qText, opts, ans, image: p.imageUrl });
                }
                setQuestions(qList);
            };

            useEffect(() => {
                generateQuestions();
            }, [plants]);

            const handleAns = (opt) => {
                const isCorrect = opt === questions[currentQ].ans;
                if (isCorrect) {
                    setScore(s => s + 1);
                    setFeedback('correct');
                } else {
                    setFeedback('wrong');
                }

                setTimeout(() => {
                    setFeedback(null);
                    if (currentQ < questions.length - 1) {
                        setCurrentQ(q => q + 1);
                    } else {
                        setShowResult(true);
                    }
                }, 1000);
            };

            const reset = () => {
                setCurrentQ(0);
                setScore(0);
                setShowResult(false);
                generateQuestions();
            };

            if (questions.length === 0) return <div className="text-center py-10">טוען חידון...</div>;

            return (
                <div className="max-w-2xl mx-auto bg-white rounded-3xl p-6 md:p-10 shadow-2xl fade-in text-center border-t-8 border-pastel-pink relative overflow-hidden">
                    {/* Visual Feedback Overlay */}
                    {feedback === 'correct' && <div className="absolute inset-0 bg-green-500/20 z-10 flex items-center justify-center animate-pulse"><Icon name="check-circle" className="w-32 h-32 text-green-600 drop-shadow-lg" /></div>}
                    {feedback === 'wrong' && <div className="absolute inset-0 bg-red-500/20 z-10 flex items-center justify-center animate-pulse"><Icon name="x-circle" className="w-32 h-32 text-red-600 drop-shadow-lg" /></div>}

                    <h2 className="text-3xl font-bold mb-6 text-pink-800"><Icon name="brain" className="inline mb-1"/> חידון בוטניקה מתקדם</h2>
                    
                    {!showResult ? (
                        <div>
                            <div className="flex justify-between text-gray-500 mb-4 font-bold">
                                <span>שאלה {currentQ + 1} מתוך {questions.length}</span>
                                <span className="text-teal-600">ניקוד: {score}</span>
                            </div>
                            
                            <div className="w-full h-40 md:h-56 mb-6 rounded-2xl overflow-hidden shadow-inner border border-gray-100">
                                <img src={questions[currentQ].image} alt="Hint" className="w-full h-full object-cover blur-[2px] hover:blur-none transition-all duration-500" />
                            </div>

                            <h3 className="text-2xl font-bold text-gray-800 mb-8 leading-snug">{questions[currentQ].q}</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {questions[currentQ].opts.map((opt, i) => (
                                    <button 
                                        key={i}
                                        onClick={() => handleAns(opt)}
                                        disabled={feedback !== null}
                                        className="w-full bg-pastel-blue hover:bg-teal-200 text-teal-900 font-bold py-4 px-4 rounded-3xl text-lg transition-all shadow-sm active:scale-95 disabled:opacity-50"
                                    >
                                        {opt}
                                    </button>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="py-10 fade-in">
                            <Icon name="trophy" className="w-24 h-24 text-yellow-400 mx-auto mb-4" />
                            <h3 className="text-4xl font-bold text-teal-600 mb-4">
                                {score === questions.length ? 'מושלם! אתה פרופסור לבוטניקה 🎓' : score >= 3 ? 'כל הכבוד! יש לך אצבעות ירוקות 🌿' : 'אוי, אולי עדיף שתגדל קקטוסים מפלסטיק... 🌵'}
                            </h3>
                            <p className="text-2xl mb-8 font-bold text-gray-700">הציון הסופי שלך: {score} מתוך {questions.length}</p>
                            <button onClick={reset} className="bg-pink-500 hover:bg-pink-600 text-white font-bold py-4 px-10 text-xl rounded-full shadow-lg transition-transform hover:scale-105 active:scale-95">
                                שחק שוב! 🔄
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('catalog');

            return (
                <div>
                    <header className="bg-teal-800 text-white p-8 rounded-b-[3rem] shadow-xl mb-10 text-center">
                        <h1 className="text-5xl font-bold mb-4 flex justify-center items-center gap-4">
                            <Icon name="leaf" className="w-12 h-12 text-pastel-green" /> 
                            בוטניקה-פדיה
                        </h1>
                        <p className="text-teal-200 text-lg">חקור, למד וגדל את הצמחים המיוחדים ביותר בעולם</p>
                    </header>

                    <nav className="flex justify-center gap-4 mb-10 px-4 flex-wrap">
                        <button onClick={() => setActiveTab('catalog')} className={`px-8 py-3 rounded-full font-bold transition-all shadow-md flex items-center gap-2 ${activeTab === 'catalog' ? 'bg-teal-600 text-white transform scale-105' : 'bg-white text-teal-800 hover:bg-teal-50'}`}>
                            <Icon name="library" /> קטלוג
                        </button>
                        <button onClick={() => setActiveTab('swipe')} className={`px-8 py-3 rounded-full font-bold transition-all shadow-md flex items-center gap-2 ${activeTab === 'swipe' ? 'bg-pink-500 text-white transform scale-105' : 'bg-white text-pink-600 hover:bg-pink-50'}`}>
                            <Icon name="flame" /> היכרויות 
                        </button>
                        <button onClick={() => setActiveTab('simulator')} className={`px-8 py-3 rounded-full font-bold transition-all shadow-md flex items-center gap-2 ${activeTab === 'simulator' ? 'bg-teal-600 text-white transform scale-105' : 'bg-white text-teal-800 hover:bg-teal-50'}`}>
                            <Icon name="sprout" /> סימולטור
                        </button>
                        <button onClick={() => setActiveTab('trivia')} className={`px-8 py-3 rounded-full font-bold transition-all shadow-md flex items-center gap-2 ${activeTab === 'trivia' ? 'bg-teal-600 text-white transform scale-105' : 'bg-white text-teal-800 hover:bg-teal-50'}`}>
                            <Icon name="gamepad-2" /> חידון
                        </button>
                    </nav>

                    <main className="container mx-auto px-4">
                        {activeTab === 'catalog' && <PlantCatalog plants={plantDatabase} />}
                        {activeTab === 'swipe' && <PlantSwipe plants={plantDatabase} />}
                        {activeTab === 'simulator' && <GrowthSimulator plants={plantDatabase} />}
                        {activeTab === 'trivia' && <AdvancedTrivia plants={plantDatabase} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
